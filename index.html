<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strade - Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #0f0e1a;
            color: #e4e4e4;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.25) saturate(0.7);
        }

        .messenger {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px 20px;
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(18px);
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 30px;
            padding: 2px 14px;
            font-size: 10px;
            color: #a0b4ff;
            letter-spacing: 0.5px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .user-badge {
            font-size: 13px;
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: 0.2s;
        }
        .user-badge:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .id-badge {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-family: monospace;
            letter-spacing: 1px;
        }
        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #888;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .main-grid {
            display: flex;
            flex: 1;
            gap: 16px;
            min-height: 0;
            padding-top: 12px;
        }

        .sidebar {
            width: 240px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 8px;
            padding-left: 4px;
        }
        .sidebar .section {
            margin-bottom: 12px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 13px;
            color: #ccc;
            border: 1px solid transparent;
        }
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .chat-item.active {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.2);
            color: #fff;
        }
        .chat-item .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        .chat-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: auto;
            background: #4ade80;
        }
        .chat-item .status.offline {
            background: #555;
        }
        .add-friend-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            color: #aaa;
            padding: 10px;
            border-radius: 14px;
            margin-top: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .add-friend-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        .friend-id-input {
            display: none;
            gap: 6px;
            margin-top: 6px;
            padding: 6px;
        }
        .friend-id-input.active {
            display: flex;
        }
        .friend-id-input input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 12px;
            outline: none;
            font-family: monospace;
        }
        .friend-id-input input:focus {
            border-color: #667eea;
        }
        .friend-id-input button {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }
        .chat-header {
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
            font-weight: 500;
            color: #ddd;
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header .chat-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .chat-name .avatar-sm {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }
        .chat-header .chat-id {
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            font-family: monospace;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .message {
            max-width: 72%;
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }
        .message.self {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.88);
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }
        .message.self .time {
            color: rgba(255, 255, 255, 0.6);
        }
        .message.other .time {
            color: #777;
        }
        .message img,
        .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 6px;
            max-height: 260px;
        }
        .message .msg-sender {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 3px;
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px 14px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.15);
        }
        .input-row {
            display: flex;
            flex: 1;
            gap: 10px;
            min-width: 200px;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 14px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.25s;
        }
        .input-area input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .input-area input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.13);
            border-color: #667eea;
        }
        .input-area button {
            padding: 12px 22px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.3);
        }
        .input-area button:active {
            transform: scale(0.95);
        }
        .file-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ccc;
            padding: 12px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .file-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .file-btn input {
            display: none;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .modal-box h2 {
            color: #fff;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .modal-box p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 12px;
        }
        .modal-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.15);
        }
        .modal-box .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-box .modal-btns button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-box .modal-btns .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .modal-box .modal-btns .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.3);
        }
        .modal-box .modal-btns .cancel-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
        }
        .modal-box .modal-btns .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .sidebar::-webkit-scrollbar,
        .messages::-webkit-scrollbar {
            width: 3px;
        }
        .sidebar::-webkit-scrollbar-thumb,
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .sidebar {
                width: 180px;
                padding: 10px 6px;
            }
            .chat-item {
                font-size: 12px;
                padding: 6px 8px;
            }
            .messenger {
                padding: 10px;
            }
            .header-left h1 {
                font-size: 20px;
            }
            .modal-box {
                padding: 20px;
            }
        }
        @media (max-width: 500px) {
            .sidebar {
                display: none;
            }
            .main-grid {
                gap: 0;
            }
            .message {
                max-width: 88%;
            }
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="messenger" id="messenger">

        <div class="modal-overlay" id="nameModal">
            <div class="modal-box">
                <h2>✏️ Сменить имя</h2>
                <p>Введите новое имя пользователя</p>
                <input type="text" id="newNameInput" placeholder="Новое имя..." maxlength="20">
                <div class="modal-btns">
                    <button class="cancel-btn" id="modalCancel">Отмена</button>
                    <button class="save-btn" id="modalSave">Сохранить</button>
                </div>
            </div>
        </div>

        <div class="header">
            <div class="header-left">
                <h1>Strade</h1>
                <span class="badge">✦ мессенджер</span>
            </div>
            <div class="header-actions">
                <span class="id-badge" id="idDisplay">🆔 загрузка...</span>
                <button class="copy-btn" id="copyIdBtn">📋 Копировать ID</button>
                <span class="user-badge" id="userBadge">👤 Пользователь</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="sidebar" id="sidebar">
                <div class="section">
                    <h3>💬 Чаты</h3>
                    <div id="chatList">
                        <div class="chat-item active" data-chat="general">
                            <span class="avatar">🌐</span>
                            Общий чат
                            <span class="status"></span>
                        </div>
                    </div>
                </div>
                <div class="section">
                    <h3>👥 Друзья</h3>
                    <div id="friendList"></div>
                    <div class="add-friend-btn" id="addFriendBtn">＋ Добавить друга</div>
                    <div class="friend-id-input" id="friendIdInput">
                        <input type="text" id="friendIdField" placeholder="Введите ID друга (7 символов)">
                        <button id="addFriendSubmit">➕</button>
                    </div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-name">
                        <span class="avatar-sm" id="chatAvatar">🌐</span>
                        <span id="chatTitle">Общий чат</span>
                    </div>
                    <span class="chat-id" id="chatIdDisplay">ID: general</span>
                </div>

                <div class="messages" id="messages">
                    <div class="message other">
                        👋 Добро пожаловать в <strong>Strade</strong>!<br>
                        <span style="font-size:12px; opacity:0.6;">Твой уникальный ID: <strong id="welcomeId">загрузка...</strong></span>
                        <span class="time">сейчас</span>
                    </div>
                </div>

                <div class="input-area" id="inputArea">
                    <div class="input-row">
                        <input type="text" id="messageInput" placeholder="Напиши сообщение...">
                        <button id="sendBtn">Отправить</button>
                    </div>
                    <label class="file-btn">
                        📎 <input type="file" id="fileInput" accept="image/*,video/*">
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- ГЕНЕРАЦИЯ УНИКАЛЬНОГО ID (7 символов) ----
            function generateUserId(ip) {
                let hash = 0;
                for (let i = 0; i < ip.length; i++) {
                    const char = ip.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                let id = Math.abs(hash).toString(36).toUpperCase();
                while (id.length < 7) {
                    id = 'A' + id;
                }
                id = id.slice(0, 7);
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let result = '';
                for (let i = 0; i < 7; i++) {
                    if (i < id.length) {
                        result += id[i];
                    } else {
                        result += chars[Math.floor(Math.random() * chars.length)];
                    }
                }
                return result.split('').sort(() => Math.random() - 0.5).join('');
            }

            function getIP() {
                return fetch('https://api.ipify.org?format=json')
                    .then(res => res.json())
                    .then(data => data.ip)
                    .catch(() => {
                        let fallback = localStorage.getItem('strade_ip_fallback');
                        if (!fallback) {
                            fallback = '127.0.0.' + Math.floor(Math.random() * 255);
                            localStorage.setItem('strade_ip_fallback', fallback);
                        }
                        return fallback;
                    });
            }

            // ---- СОСТОЯНИЕ ----
            let currentUser = null;
            let currentUserId = null;
            let currentIP = null;
            let friends = [];
            let chats = {
                'general': {
                    name: 'Общий чат',
                    messages: [],
                    avatar: '🌐'
                }
            };
            let currentChat = 'general';

            // ---- DOM ----
            const userBadge = document.getElementById('userBadge');
            const idDisplay = document.getElementById('idDisplay');
            const chatTitle = document.getElementById('chatTitle');
            const chatIdDisplay = document.getElementById('chatIdDisplay');
            const chatAvatar = document.getElementById('chatAvatar');
            const messagesContainer = document.getElementById('messages');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const fileInput = document.getElementById('fileInput');
            const chatList = document.getElementById('chatList');
            const friendList = document.getElementById('friendList');
            const addFriendBtn = document.getElementById('addFriendBtn');
            const friendIdInput = document.getElementById('friendIdInput');
            const friendIdField = document.getElementById('friendIdField');
            const addFriendSubmit = document.getElementById('addFriendSubmit');
            const copyIdBtn = document.getElementById('copyIdBtn');
            const welcomeId = document.getElementById('welcomeId');

            const nameModal = document.getElementById('nameModal');
            const newNameInput = document.getElementById('newNameInput');
            const modalSave = document.getElementById('modalSave');
            const modalCancel = document.getElementById('modalCancel');

            // ---- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----
            function getTime() {
                const d = new Date();
                return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
            }

            function addMessage(text, type, sender = null, extra = '') {
                const div = document.createElement('div');
                div.className = 'message ' + type;
                let senderHtml = '';
                if (sender && sender !== currentUser) {
                    senderHtml = `<span class="msg-sender">${sender}</span>`;
                }
                div.innerHTML = senderHtml + text + extra + '<span class="time">' + getTime() + '</span>';
                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function renderChats() {
                chatList.innerHTML = '';
                Object.keys(chats).forEach(key => {
                    const chat = chats[key];
                    const div = document.createElement('div');
                    div.className = 'chat-item' + (key === currentChat ? ' active' : '');
                    div.dataset.chat = key;
                    div.innerHTML = `
                        <span class="avatar">${chat.avatar || '💬'}</span>
                        ${chat.name}
                        <span class="status"></span>
                    `;
                    div.addEventListener('click', function() {
                        switchChat(key);
                    });
                    chatList.appendChild(div);
                });
            }

            function renderFriends() {
                friendList.innerHTML = '';
                friends.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <span class="avatar">${f.name ? f.name[0] : '?'}</span>
                        ${f.name || f.id}
                        <span class="status ${Math.random() > 0.5 ? '' : 'offline'}"></span>
                    `;
                    div.addEventListener('click', function() {
                        const chatKey = 'friend_' + f.id;
                        if (!chats[chatKey]) {
                            chats[chatKey] = {
                                name: f.name || f.id,
                                messages: [],
                                avatar: f.name ? f.name[0] : '👤',
                                isFriend: true,
                                friendId: f.id
                            };
                            renderChats();
                        }
                        switchChat(chatKey);
                    });
                    friendList.appendChild(div);
                });
            }

            function switchChat(chatKey) {
                currentChat = chatKey;
                const chat = chats[chatKey];
                if (!chat) return;

                chatTitle.textContent = chat.name;
                chatAvatar.textContent = chat.avatar || '💬';
                chatIdDisplay.textContent = 'ID: ' + chatKey;

                messagesContainer.innerHTML = '';

                if (chat.messages && chat.messages.length > 0) {
                    chat.messages.forEach(msg => {
                        const type = msg.sender === currentUser ? 'self' : 'other';
                        addMessage(msg.text, type, msg.sender !== currentUser ? msg.sender : null);
                    });
                } else {
                    addMessage('💬 Начните общение в ' + chat.name, 'other');
                }

                document.querySelectorAll('.chat-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.chat === chatKey);
                });

                messageInput.focus();
            }

            function saveData() {
                const data = {
                    userId: currentUserId,
                    userName: currentUser,
                    friends: friends,
                    chats: chats,
                    ip: currentIP
                };
                try {
                    localStorage.setItem('strade_data_' + currentUserId, JSON.stringify(data));
                } catch (e) {}
            }

            function loadData(userId) {
                try {
                    const raw = localStorage.getItem('strade_data_' + userId);
                    if (raw) {
                        const data = JSON.parse(raw);
                        friends = data.friends || [];
                        chats = data.chats || {};
                        if (!chats['general']) {
                            chats['general'] = { name: 'Общий чат', messages: [], avatar: '🌐' };
                        }
                        return data;
                    }
                } catch (e) {}
                return null;
            }

            // ---- ЗАГРУЗКА ПРОФИЛЯ ----
            function loadProfile(ip) {
                currentIP = ip;
                const userId = generateUserId(ip);
                currentUserId = userId;
                idDisplay.textContent = '🆔 ' + userId;
                if (welcomeId) welcomeId.textContent = userId;

                const data = loadData(userId);
                if (data) {
                    currentUser = data.userName || 'User_' + userId.slice(0, 4);
                    friends = data.friends || [];
                    chats = data.chats || {};
                    if (!chats['general']) {
                        chats['general'] = { name: 'Общий чат', messages: [], avatar: '🌐' };
                    }
                } else {
                    currentUser = 'User_' + userId.slice(0, 4);
                    chats = {
                        'general': { name: 'Общий чат', messages: [], avatar: '🌐' }
                    };
                    friends = [];
                    saveData();
                }

                userBadge.textContent = '👤 ' + currentUser;
                renderChats();
                renderFriends();
                switchChat('general');
            }

            // ---- СМЕНА ИМЕНИ ----
            function changeName(newName) {
                if (!newName || newName.trim().length < 1) return false;
                newName = newName.trim();
                if (newName.length > 20) {
                    alert('Имя не может быть длиннее 20 символов');
                    return false;
                }
                if (/bot|admin|test|robot/i.test(newName)) {
                    alert('Недопустимое имя');
                    return false;
                }

                currentUser = newName;
                userBadge.textContent = '👤 ' + currentUser;
                saveData();
                addMessage('✏️ Имя изменено на <strong>' + currentUser + '</strong>', 'other');
                return true;
            }

            // ---- ДОБАВЛЕНИЕ ДРУГА ----
            function addFriend(friendId) {
                friendId = friendId.trim().toUpperCase();
                if (friendId.length !== 7) {
                    alert('ID должен состоять из 7 символов');
                    return false;
                }
                if (friendId === currentUserId) {
                    alert('Нельзя добавить самого себя');
                    return false;
                }
                if (friends.some(f => f.id === friendId)) {
                    alert('Этот друг уже добавлен');
                    return false;
                }

                const friendData = loadData(friendId);
                const friendName = friendData ? friendData.userName : 'Friend_' + friendId.slice(0, 4);

                friends.push({ id: friendId, name: friendName });
                saveData();
                renderFriends();

                const chatKey = 'friend_' + friendId;
                if (!chats[chatKey]) {
                    chats[chatKey] = {
                        name: friendName,
                        messages: [],
                        avatar: friendName[0] || '👤',
                        isFriend: true,
                        friendId: friendId
                    };
                }
                renderChats();
                addMessage('👤 Друг <strong>' + friendName + '</strong> добавлен!', 'other');
                return true;
            }

            // ---- ОТПРАВКА СООБЩЕНИЯ ----
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text) return;

                const chat = chats[currentChat];
                if (!chat) return;

                const msg = { sender: currentUser, text: text, time: Date.now() };
                chat.messages.push(msg);
                saveData();

                addMessage(text, 'self');
                messageInput.value = '';

                // Имитация ответа
                setTimeout(function() {
                    const replies = [
                        '👍 Понял!', 'Круто!', '😊', 'Здорово!', 'Strade - лучший!',
                        'Спасибо, что поделился!', '💫', '✌️', '🔥', '✅'
                    ];
                    const reply = replies[Math.floor(Math.random() * replies.length)];
                    const replyMsg = { sender: 'Strade', text: reply, time: Date.now() };
                    chat.messages.push(replyMsg);
                    saveData();
                    addMessage(reply, 'other', 'Strade');
                }, 400 + Math.random() * 600);
            }

            // ---- ОБРАБОТКА ФАЙЛОВ ----
            function handleFile(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = e.target.result;
                    let mediaTag = '';
                    if (file.type.startsWith('image/')) {
                        mediaTag = `<img src="${data}" alt="изображение">`;
                    } else if (file.type.startsWith('video/')) {
                        mediaTag = `<video src="${data}" controls muted style="max-width:100%;max-height:220px;border-radius:12px;"></video>`;
                    } else {
                        addMessage('⚠️ Поддерживаются только изображения и видео.', 'other');
                        return;
                    }
                    const chat = chats[currentChat];
                    if (chat) {
                        const msg = { sender: currentUser, text: '📎 Отправлено ' + (file.type.startsWith('image/') ? 'изображение' : 'видео'), media: mediaTag, time: Date.now() };
                        chat.messages.push(msg);
                        saveData();
                    }
                    addMessage('📎 Отправлено ' + (file.type.startsWith('image/') ? 'изображение' : 'видео') + ' ' + mediaTag, 'self');
                };
                reader.readAsDataURL(file);
            }

            // ---- ОБРАБОТЧИКИ СОБЫТИЙ ----
            userBadge.addEventListener('click', function() {
                newNameInput.value = currentUser || '';
                nameModal.classList.add('active');
                setTimeout(() => newNameInput.focus(), 100);
            });

            modalSave.addEventListener('click', function() {
                const newName = newNameInput.value.trim();
                if (changeName(newName)) {
                    nameModal.classList.remove('active');
                }
            });

            modalCancel.addEventListener('click', function() {
                nameModal.classList.remove('active');
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && nameModal.classList.contains('active')) {
                    nameModal.classList.remove('active');
                }
                if (e.key === 'Enter' && nameModal.classList.contains('active')) {
                    const newName = newNameInput.value.trim();
                    if (changeName(newName)) {
                        nameModal.classList.remove('active');
                    }
                }
            });

            sendBtn.addEventListener('click', sendMessage);

            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });

            addFriendBtn.addEventListener('click', function() {
                friendIdInput.classList.toggle('active');
                if (friendIdInput.classList.contains('active')) {
                    friendIdField.focus();
                }
            });

            addFriendSubmit.addEventListener('click', function() {
                const id = friendIdField.value.trim();
                if (addFriend(id)) {
                    friendIdField.value = '';
                    friendIdInput.classList.remove('active');
                }
            });

            friendIdField.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const id = friendIdField.value.trim();
                    if (addFriend(id)) {
                        friendIdField.value = '';
                        friendIdInput.classList.remove('active');
                    }
                }
            });

            copyIdBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(currentUserId).then(() => {
                    alert('ID скопирован: ' + currentUserId);
                }).catch(() => {
                    // Fallback
                    const input = document.createElement('input');
                    input.value = currentUserId;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    alert('ID скопирован: ' + currentUserId);
                });
            });

            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
                fileInput.value = '';
            });

            // ---- ИНИЦИАЛИЗАЦИЯ ----
            getIP().then(ip => {
                loadProfile(ip);
            });

            console.log('🚀 Strade Messenger запущен!');
            console.log('📋 Ваш ID будет показан в шапке');

        })();
    </script>
</body>
</html>
