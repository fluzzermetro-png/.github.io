<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StradeИИ - Нейросеть</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: #0a0a1a; }
        
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.3);
        }
        
        .messenger {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        .header {
            padding: 15px 0 10px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            margin-top: 3px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .message.self {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.other {
            align-self: flex-start;
            background: rgba(255,255,255,0.9);
            color: #222;
            border-bottom-left-radius: 5px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            display: block;
            text-align: right;
        }
        .message.self .time { color: rgba(255,255,255,0.7); }
        .message.other .time { color: #888; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .typing-indicator {
            align-self: flex-start;
            background: rgba(255,255,255,0.85);
            padding: 10px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            display: none;
            color: #555;
            font-size: 14px;
        }
        .typing-indicator span {
            animation: dots 1.4s infinite;
            display: inline-block;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dots {
            0%, 20% { opacity: 0; }
            40% { opacity: 1; }
            100% { opacity: 1; }
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            padding: 15px 0 5px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 14px 22px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 15px;
            outline: none;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .input-area input::placeholder { color: rgba(255,255,255,0.4); }
        .input-area input:focus {
            background: rgba(255,255,255,0.18);
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102,126,234,0.2);
        }
        .input-area button {
            padding: 14px 32px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102,126,234,0.3);
        }
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(102,126,234,0.4);
        }
        .input-area button:active { transform: scale(0.95); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .key-status {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            text-align: center;
            padding: 5px;
            cursor: pointer;
        }
        .key-status:hover { color: rgba(255,255,255,0.6); }
        .key-status.active { color: rgba(100, 255, 100, 0.6); }
        .key-status.inactive { color: rgba(255, 100, 100, 0.6); }
        
        .lock-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }
        .lock-overlay h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lock-overlay p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .lock-overlay .key-input {
            padding: 16px 24px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            width: 350px;
            max-width: 80%;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }
        .lock-overlay .key-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 40px rgba(102,126,234,0.2);
        }
        .lock-overlay .key-input::placeholder { color: rgba(255,255,255,0.3); }
        .lock-overlay .unlock-btn {
            margin-top: 20px;
            padding: 14px 50px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 30px rgba(102,126,234,0.3);
        }
        .lock-overlay .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 40px rgba(102,126,234,0.4);
        }
        .lock-overlay .unlock-btn:active { transform: scale(0.95); }
        .lock-overlay .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }
        .lock-overlay .key-hint {
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            margin-top: 20px;
            max-width: 400px;
            text-align: center;
            line-height: 1.6;
        }
        
        .messenger.locked .messages,
        .messenger.locked .input-area,
        .messenger.locked .typing-indicator {
            opacity: 0.3;
            pointer-events: none;
        }
        .messenger.locked .lock-overlay { display: flex; }
        .messenger.unlocked .lock-overlay { display: none; }
        .messenger.unlocked .messages,
        .messenger.unlocked .input-area,
        .messenger.unlocked .typing-indicator {
            opacity: 1;
            pointer-events: auto;
        }
        
        .free-badge {
            background: rgba(0, 200, 0, 0.2);
            border: 1px solid rgba(0, 200, 0, 0.3);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 10px;
            color: #7fdb7f;
            display: inline-block;
            margin-left: 10px;
        }
        
        @media (max-width: 600px) {
            .messenger { padding: 10px; backdrop-filter: blur(5px); }
            .message { max-width: 90%; font-size: 14px; padding: 10px 14px; }
            .input-area input { padding: 12px 16px; font-size: 14px; }
            .input-area button { padding: 12px 20px; font-size: 13px; }
            .lock-overlay .key-input { width: 90%; }
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="messenger locked" id="messenger">
        
        <div class="lock-overlay" id="lockOverlay">
            <h2>🔒 StradeИИ</h2>
            <p>Введи ключ для доступа к нейросети</p>
            <input type="text" class="key-input" id="keyInput" placeholder="Введите ключ StradeИИ_..." autofocus>
            <button class="unlock-btn" id="unlockBtn">🔓 Разблокировать</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="key-hint">Ключи выдаются администратором StradeИИ</div>
        </div>

        <div class="header">
            <h1>🧠 StradeИИ <span class="free-badge">БЕСПЛАТНО</span></h1>
            <div class="subtitle">✦ НАСТОЯЩАЯ НЕЙРОСЕТЬ ✦</div>
        </div>

        <div class="messages" id="messages">
            <div class="message other">
                🔒 <strong>StradeИИ заблокирован</strong><br>
                <span style="font-size:12px; opacity:0.6;">Введите ключ для доступа</span>
                <span class="time">00:00</span>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span>●</span><span>●</span><span>●</span> StradeИИ думает...
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Спроси у нейросети..." autofocus disabled>
            <button id="sendBtn" disabled>➤ Отправить</button>
        </div>
        
        <div class="key-status inactive" id="keyStatus">🔑 Статус: ЗАБЛОКИРОВАН</div>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================
            // 🔑 КЛЮЧИ StradeИИ
            // =============================================
            const VALID_KEYS = [
                'StradeИИ_F9oKLP0k',
                'StradeИИ_А84fsJ89',
                'StradeИИ_23gdGD5HD',
                'StradeИИ_FD5HVDg',
                'StradeИИ_F9oGH457',
                'StradeИИ_BN54GD54KK',
                'StradeИИ_F9oFJS634',
                'StradeИИ_HG78kL90s',
                'StradeИИ_PL56mN87b',
                'StradeИИ_QR34tY56u',
                'StradeИИ_WX12zX34c',
                'StradeИИ_AS78dF90g',
                'StradeИИ_ZX56cV78b',
                'StradeИИ_MN34bN56m',
                'StradeИИ_KL12pL34k',
                'StradeИИ_JU90hU78j',
                'StradeИИ_YH56gH34f',
                'StradeИИ_GF23dF12g',
                'StradeИИ_DS89sD67d',
                'StradeИИ_FG45gF23f',
                'StradeИИ_HJ67jH89h',
                'StradeИИ_UI90iU12u',
                'StradeИИ_OP78pO34o',
                'StradeИИ_ER56rE78e',
                'StradeИИ_TY34tY90y',
                'StradeИИ_UI12uI56i',
                'StradeИИ_OP90oP78p',
                'StradeИИ_AS12sA34a'
            ];

            // =============================================
            // 🌐 МНОГО ПРОКСИ (ВСЕ ВОЗМОЖНЫЕ ВАРИАНТЫ)
            // =============================================
            const PROXIES = [
                // Llama API
                {
                    url: 'https://api.llama-api.com/chat/completions',
                    model: 'llama-3.1-8b',
                    headers: { 'Content-Type': 'application/json' }
                },
                // Другие бесплатные прокси
                {
                    url: 'https://api.g4f.icu/v1/chat/completions',
                    model: 'gpt-3.5-turbo',
                    headers: { 'Content-Type': 'application/json' }
                },
                {
                    url: 'https://chatapi.one/v1/chat/completions',
                    model: 'gpt-3.5-turbo',
                    headers: { 'Content-Type': 'application/json' }
                },
                {
                    url: 'https://api.aicode.one/v1/chat/completions',
                    model: 'gpt-3.5-turbo',
                    headers: { 'Content-Type': 'application/json' }
                },
                {
                    url: 'https://gpt-api.live/v1/chat/completions',
                    model: 'gpt-3.5-turbo',
                    headers: { 'Content-Type': 'application/json' }
                },
                {
                    url: 'https://api.chatanywhere.tech/v1/chat/completions',
                    model: 'gpt-3.5-turbo',
                    headers: { 'Content-Type': 'application/json' }
                }
            ];

            // =============================================
            // ОСТАЛЬНОЙ КОД
            // =============================================
            
            let isUnlocked = false;
            let currentKey = localStorage.getItem('strade_key') || null;
            let isWaiting = false;

            const messenger = document.getElementById('messenger');
            const lockOverlay = document.getElementById('lockOverlay');
            const keyInput = document.getElementById('keyInput');
            const unlockBtn = document.getElementById('unlockBtn');
            const errorMsg = document.getElementById('errorMsg');
            const keyStatus = document.getElementById('keyStatus');
            const messagesContainer = document.getElementById('messages');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendBtn');
            const typingIndicator = document.getElementById('typingIndicator');

            function getCurrentTime() {
                const now = new Date();
                return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            }

            function createMessage(text, type) {
                const div = document.createElement('div');
                div.className = 'message ' + type;
                div.innerHTML = text + '<span class="time">' + getCurrentTime() + '</span>';
                return div;
            }

            function addMessage(text, type) {
                if (!text.trim()) return;
                const msg = createMessage(text.trim(), type);
                messagesContainer.appendChild(msg);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function showTyping() {
                typingIndicator.style.display = 'block';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function hideTyping() {
                typingIndicator.style.display = 'none';
            }

            function clearMessages() {
                messagesContainer.innerHTML = '';
            }

            function validateKey(key) {
                return VALID_KEYS.includes(key.trim());
            }

            function unlock(key) {
                if (validateKey(key)) {
                    isUnlocked = true;
                    currentKey = key;
                    localStorage.setItem('strade_key', key);
                    
                    messenger.classList.remove('locked');
                    messenger.classList.add('unlocked');
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                    keyStatus.textContent = '✅ Статус: АКТИВИРОВАН (ключ: ' + key + ')';
                    keyStatus.className = 'key-status active';
                    
                    clearMessages();
                    addMessage('🔓 <strong>StradeИИ разблокирован!</strong> 🎉<br><span style="font-size:13px; opacity:0.8;">Привет! Я нейросеть. Спрашивай что угодно! 🤖</span>', 'other');
                    
                    errorMsg.textContent = '';
                    keyInput.value = '';
                    messageInput.focus();
                    return true;
                } else {
                    errorMsg.textContent = '❌ Неверный ключ StradeИИ! Попробуй ещё раз.';
                    keyInput.value = '';
                    keyInput.focus();
                    return false;
                }
            }

            // ===== ЗАПРОС К НЕЙРОСЕТИ (ПЕРЕБОР ВСЕХ ПРОКСИ) =====
            async function askAI(userMessage) {
                let lastError = null;
                
                for (let i = 0; i < PROXIES.length; i++) {
                    const proxy = PROXIES[i];
                    try {
                        console.log(`Пробуем прокси ${i+1}/${PROXIES.length}: ${proxy.url}`);
                        
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 15000);
                        
                        const response = await fetch(proxy.url, {
                            method: 'POST',
                            headers: proxy.headers,
                            body: JSON.stringify({
                                model: proxy.model,
                                messages: [
                                    {
                                        role: 'system',
                                        content: 'Ты — StradeИИ, дружелюбный и умный ИИ-помощник. Отвечай кратко, но информативно. Если спрашивают как тебя зовут — отвечай, что тебя зовут StradeИИ. Ты работаешь бесплатно без ограничений.'
                                    },
                                    {
                                        role: 'user',
                                        content: userMessage
                                    }
                                ],
                                temperature: 0.8,
                                max_tokens: 500
                            }),
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);

                        if (!response.ok) {
                            const errorText = await response.text();
                            console.warn(`Прокси ${i+1} ошибка ${response.status}:`, errorText.substring(0, 100));
                            continue;
                        }

                        const data = await response.json();
                        
                        if (data.choices && data.choices[0] && data.choices[0].message) {
                            return data.choices[0].message.content;
                        } else {
                            console.warn(`Прокси ${i+1} вернул неожиданный ответ`);
                            continue;
                        }
                    } catch (error) {
                        if (error.name === 'AbortError') {
                            console.warn(`Прокси ${i+1} таймаут`);
                        } else {
                            console.warn(`Прокси ${i+1} недоступен:`, error.message);
                        }
                        lastError = error;
                        continue;
                    }
                }
                
                throw new Error('Все API временно недоступны. Попробуйте позже или используйте VPN. (Ошибка: ' + (lastError ? lastError.message : 'неизвестная') + ')');
            }

            // ===== ОТПРАВКА =====
            async function sendMessage() {
                if (!isUnlocked) {
                    addMessage('🔒 Сначала введи ключ StradeИИ!', 'other');
                    return;
                }

                const text = messageInput.value;
                if (!text.trim() || isWaiting) return;

                addMessage(text, 'self');
                messageInput.value = '';
                messageInput.focus();

                isWaiting = true;
                sendButton.disabled = true;
                showTyping();

                try {
                    const response = await askAI(text);
                    addMessage(response.replace(/\n/g, '<br>'), 'other');
                } catch (error) {
                    addMessage('⚠️ ' + error.message, 'other');
                } finally {
                    hideTyping();
                    isWaiting = false;
                    sendButton.disabled = false;
                }
            }

            // ===== ОБРАБОТЧИКИ =====
            unlockBtn.addEventListener('click', function() {
                unlock(keyInput.value);
            });

            keyInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    unlock(keyInput.value);
                }
            });

            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // ===== АВТОВХОД =====
            if (currentKey && validateKey(currentKey)) {
                unlock(currentKey);
            } else {
                localStorage.removeItem('strade_key');
                setTimeout(() => {
                    addMessage('🔒 Введите ключ StradeИИ для доступа к нейросети', 'other');
                    keyInput.focus();
                }, 500);
            }

            // ===== ВИДЕО =====
            const video = document.getElementById('bg-video');
            video.addEventListener('error', function() {
                document.body.style.background = '#0f0e1a';
            });

            console.log('🧠 StradeИИ (Нейросеть) запущен!');
            console.log('🔑 Ключей в базе: ' + VALID_KEYS.length);
            console.log('🌐 Прокси-серверов: ' + PROXIES.length);

        })();
    </script>

</body>
</html>
